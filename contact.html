<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SignalBytes</title>
    <meta name="description" content="Contact SignalBytes. Reach out to our India/Ireland Global Operations team for inquiries.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1A1A1A;
            --accent-color: #7C3AED;
            --card-bg: #f8f9fa;
            --border-color: #e5e7eb;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-color);
        }
        nav {
            display: flex;
            gap: 1.5rem;
        }
        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--accent-color);
        }
        .container {
            padding: 4rem 5%;
            max-width: 800px;
            margin: 0 auto;
            min-height: 60vh;
        }
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--text-color);
        }
        .content-section {
            margin-bottom: 2rem;
        }
        .content-section p {
            margin-bottom: 1.25rem;
            font-size: 1.1rem;
            color: #444;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 2rem;
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
        }
        .contact-form input, .contact-form textarea {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            width: 100%;
        }
        .contact-form button {
            padding: 0.75rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .contact-form button:hover {
            opacity: 0.9;
        }
        footer {
            text-align: center;
            padding: 2rem 5%;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
            color: #666;
        }
        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }
            nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            .page-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            SignalBytes
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="gemini-india-guide.html">Gemini Guide</a>
            <a href="smart-home-automation.html">Smart Home</a>
            <a href="cybersecurity-checklist.html">Cybersecurity</a>
            <a href="human-ai-prompts.html">AI Prompts</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Contact Us</h1>
        <div class="content-section">
            <p><strong>Email:</strong> <a href="mailto:info@thestreamic.in" style="color: var(--accent-color); text-decoration: none;">info@thestreamic.in</a></p>
            <p><strong>Location:</strong> India/Ireland Global Operations</p>
            
            <form class="contact-form" action="#" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email Address" required>
                <input type="text" name="subject" placeholder="Subject" required>
                <textarea name="message" rows="6" placeholder="How can we help you?" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 1rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;">
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
        </div>
        <p>&copy; 2026 SignalBytes. All rights reserved.</p>
        <p>Contact us: <a href="mailto:technodate3@gmail.com">technodate3@gmail.com</a></p>
    </footer>

</body>
</html>
