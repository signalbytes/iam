<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Guide</title>

<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@700&family=Source+Serif+4:opsz,wght@8..144,400;8..144,600&family=Saira+Condensed:wght@500&display=swap" rel="stylesheet">
<style>
body{font-family:'Source Serif 4',serif;margin:0;background:#f5f3f8;color:#1b1722}
.container{max-width:1000px;margin:auto;padding:20px}
.section-hero{
  border-radius:24px;
  padding:32px 36px 28px;
  background:linear-gradient(135deg,#2c174c,#6f3ee0);
  color:#fff;
  margin-bottom:28px;
}
.section-hero-inner{max-width:720px}
.section-hero h1{font-family:'PT Serif',serif;font-size:clamp(1.8rem,3vw,2.4rem);margin-bottom:12px}
.section-hero p{font-size:0.98rem;opacity:.9}
.article-list{display:grid;gap:18px}
.article-card{display:flex;gap:16px;background:#fff;border-radius:16px;padding:12px;text-decoration:none;color:#000}
.article-card img{width:140px;height:90px;object-fit:cover;border-radius:10px}
@media(max-width:768px){
  .section-hero{padding:22px 18px}
  .section-hero h1{font-size:1.6rem}
  .article-card img{width:100px;height:70px}
}
</style>

</head>
<body>

<div class="container">

<div class="section-hero">
<div class="section-hero-inner">
<h1>AI tools for everyday work</h1>
<p>Practical guides covering writing, planning, coding, presentations, image workflows, and video editing.</p>
</div>
</div>

<div class="article-list">

<a href="#" class="article-card">
<img src="https://source.unsplash.com/300x200/?ai,workspace">
<h3>AI Tools for Drafting & Planning</h3>
</a>

<a href="#" class="article-card">
<img src="https://source.unsplash.com/300x200/?video,editing">
<h3>Best AI Video Editing Tools</h3>
</a>

<a href="#" class="article-card">
<img src="https://source.unsplash.com/300x200/?coding,laptop">
<h3>AI Coding & Prompting Guide</h3>
</a>

</div>

</div>

</body>
</html>
