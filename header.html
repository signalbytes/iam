<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignalBytes | Editorial Header Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:700&family=Source+Serif+4:opsz,wght@8..144,400;8..144,600&family=Saira+Condensed:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-violet: #7c3aed;
      --brand-violet-dark: #5b21b6;
      --text-main: #1a1a1a;
      --text-muted: #5b5b5b;
      --bg-white: #ffffff;
      --bg-soft: #f5f3ff;
      --border: #e8e2f7;
      --shadow: 0 18px 45px rgba(24, 20, 44, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Serif 4', serif;
      font-size: 1.06rem;
      line-height: 1.75;
      color: var(--text-main);
      background: var(--bg-white);
    }
    h1, h2, h3 {
      font-family: 'PT Serif', serif;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.15;
    }
    .nav-link, .btn-link, .card-tag {
      font-family: 'Saira Condensed', sans-serif;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .container { width: min(92%, 1220px); margin: 0 auto; }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(124,58,237,0.08);
    }
    .header-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--brand-violet), #9f67ff);
      box-shadow: 0 10px 26px rgba(124,58,237,0.22);
      flex-shrink: 0;
    }
    .brand-name {
      display: block;
      font-family: 'Saira Condensed', sans-serif;
      font-size: 1.45rem;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .brand-sub {
      display: block;
      font-size: 0.86rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .nav-toggle {
      display: none;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 0.7rem 0.8rem;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .site-nav {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .site-nav a {
      text-decoration: none;
      color: var(--text-main);
      padding: 0.7rem 0.92rem;
      border-radius: 999px;
      transition: background-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }
    .site-nav a:hover,
    .site-nav a:focus-visible {
      background: var(--bg-soft);
      color: var(--brand-violet-dark);
      transform: translateY(-1px);
      outline: none;
    }
    @media (max-width: 820px) {
      .header-inner { min-height: 74px; flex-wrap: wrap; }
      .nav-toggle { display: inline-flex; }
      .site-nav {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        gap: 0.45rem;
        padding: 0.35rem 0 1rem;
      }
      .site-nav.open { display: flex; }
      .site-nav a {
        width: 100%;
        text-align: left;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(124,58,237,0.08);
        background: rgba(255,255,255,0.74);
      }
      .brand-sub { display: none; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="SignalBytes home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h8l-1 8 11-14h-8l1-6Z"/></svg>
        </span>
        <span>
          <span class="brand-name">SignalBytes</span>
          <span class="brand-sub">Practical intelligence for modern digital life</span>
        </span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNav" aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <nav class="site-nav" id="siteNav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="ai-guide.html">AI Guide</a>
        <a class="nav-link" href="creator-workflows.html">Creator Workflows</a>
        <a class="nav-link" href="smart-home-automation.html">Smart Home</a>
        <a class="nav-link" href="cybersecurity-checklist.html">Cybersecurity</a>
      </nav>
    </div>
  </header>
  <script>
    const navToggle = document.getElementById('navToggle');
    const siteNav = document.getElementById('siteNav');
    if (navToggle && siteNav) {
      navToggle.addEventListener('click', () => {
        const open = siteNav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', String(open));
      });
      siteNav.querySelectorAll('a').forEach(link => link.addEventListener('click', () => {
        siteNav.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      }));
    }
  </script>
