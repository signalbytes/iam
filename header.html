<style>
:root{
  --brand-violet:#7C3AED;
  --brand-violet-2:#A78BFA;
  --text-main:#1A1A1A;
  --text-muted:#555555;
  --bg-white:#ffffff;
  --bg-soft:#f7f5ff;
  --line:#e8e2f7;
  --card:#faf8ff;
  --shadow:0 16px 40px rgba(40,18,88,.08);
  --radius:24px;
  --max:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:'Source Serif 4',serif;
  font-size:1.08rem;
  line-height:1.72;
  color:var(--text-main);
  background:linear-gradient(180deg,#fff 0%,#fcfbff 100%);
}
img{max-width:100%;display:block}
a{color:inherit}
h1,h2,h3{
  font-family:'PT Serif',serif;
  font-weight:700;
  color:var(--text-main);
  line-height:1.15;
  margin:0 0 .8rem;
}
h1{font-size:clamp(2.3rem,5vw,4.1rem)}
h2{font-size:clamp(1.8rem,3vw,2.6rem)}
h3{font-size:clamp(1.2rem,2.3vw,1.5rem)}
p{margin:.9rem 0;color:#2b2b2b}
ul{padding-left:1.25rem}
li{margin:.5rem 0}
.container{width:min(calc(100% - 2rem), var(--max)); margin:0 auto}
.topbar{
  position:sticky; top:0; z-index:40;
  backdrop-filter:saturate(180%) blur(16px);
  background:rgba(255,255,255,.9);
  border-bottom:1px solid rgba(124,58,237,.08);
}
.nav-shell{
  width:min(calc(100% - 2rem), var(--max));
  margin:0 auto;
  display:flex; align-items:center; justify-content:space-between;
  gap:1rem; min-height:76px;
}
.logo{
  display:inline-flex; align-items:center; gap:.7rem;
  text-decoration:none; font-family:'Saira Condensed',sans-serif;
  text-transform:uppercase; letter-spacing:.06em; font-size:1.15rem; color:var(--text-main);
}
.logo-mark{
  width:40px; height:40px; border-radius:14px;
  display:grid; place-items:center;
  background:linear-gradient(135deg,#f2ecff 0%,#ede9fe 100%);
  color:var(--brand-violet);
  box-shadow:inset 0 0 0 1px rgba(124,58,237,.08);
}
.logo-mark svg{width:20px;height:20px}
.menu-btn{
  display:none; border:1px solid var(--line); background:#fff; color:var(--text-main);
  border-radius:14px; width:46px; height:46px; cursor:pointer;
}
.menu-btn svg{width:20px;height:20px}
.nav-links{display:flex; gap:1rem; align-items:center; flex-wrap:wrap}
.nav-link,.btn-link,.card-tag{
  font-family:'Saira Condensed',sans-serif;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.nav-link{
  text-decoration:none; color:#302b3a; font-size:.96rem;
  padding:.55rem .8rem; border-radius:999px;
}
.nav-link:hover,.nav-link.active{background:#f5f1ff;color:var(--brand-violet)}
.hero{
  padding:3.4rem 0 2rem;
}
.hero-card{
  position:relative;
  overflow:hidden;
  border-radius:32px;
  padding:clamp(1.4rem,4vw,3rem);
  background:
    radial-gradient(circle at top right, rgba(167,139,250,.28), transparent 32%),
    linear-gradient(135deg,#17111f 0%,#24163d 36%,#f8f5ff 140%);
  color:#fff;
  box-shadow:0 25px 60px rgba(27,15,50,.22);
}
.hero-card::after{
  content:""; position:absolute; inset:auto -8% -30% auto;
  width:360px; height:360px; border-radius:50%;
  background:radial-gradient(circle, rgba(124,58,237,.18) 0%, transparent 70%);
  pointer-events:none;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.45rem .8rem; border-radius:999px;
  background:rgba(255,255,255,.1);
  color:#efe8ff; font-size:.92rem;
  margin-bottom:1rem;
}
.hero-grid{
  display:grid;
  grid-template-columns:minmax(0,1.3fr) minmax(280px,.8fr);
  gap:1.5rem;
  align-items:end;
}
.hero-copy p{color:#f0ebfa; max-width:54ch; font-size:1.12rem}
.hero-stats{
  display:grid; grid-template-columns:repeat(3,1fr); gap:.9rem;
}
.stat{
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  border-radius:22px; padding:1rem;
}
.stat strong{
  display:block; font-family:'PT Serif',serif; font-size:1.55rem; color:#fff; margin-bottom:.2rem;
}
.stat span{font-size:.9rem; color:#e8ddff}
.section{padding:1rem 0 2.6rem}
.section-head{
  display:flex; justify-content:space-between; align-items:end; gap:1rem;
  margin-bottom:1.1rem;
}
.kicker{
  color:var(--brand-violet);
  font-size:.95rem;
  margin-bottom:.35rem;
}
.lead{max-width:72ch; color:var(--text-muted)}
.mag-grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:1rem;
}
.card{
  grid-column:span 4;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:28px;
  padding:1.25rem;
  box-shadow:var(--shadow);
  display:flex; flex-direction:column; gap:.8rem;
  min-height:100%;
}
.card.featured{grid-column:span 6; background:linear-gradient(180deg,#fff 0%,#fbf9ff 100%)}
.card.compact{grid-column:span 3}
.card:hover{transform:translateY(-3px); transition:transform .2s ease, box-shadow .2s ease; box-shadow:0 22px 50px rgba(40,18,88,.12)}
.card-tag{
  color:var(--brand-violet);
  font-size:.88rem;
}
.card h3{margin:0}
.card p{margin:0; color:#454545}
.card .cta{
  margin-top:auto; color:var(--brand-violet); text-decoration:none; font-weight:600;
}
.trust-strip{
  display:grid; grid-template-columns:repeat(3,1fr); gap:1rem;
}
.trust-box{
  border:1px solid var(--line); background:#fff; border-radius:24px;
  padding:1.1rem 1.15rem; box-shadow:var(--shadow);
}
.trust-box h3{font-size:1.15rem}
.prose-shell{
  display:grid; grid-template-columns:minmax(0,1.25fr) minmax(260px,.75fr); gap:1.25rem;
}
.prose{
  background:#fff; border:1px solid var(--line); border-radius:28px;
  padding:1.4rem; box-shadow:var(--shadow);
}
.prose h2{padding-bottom:.55rem; border-bottom:2px solid #f0ebff; margin-top:2rem}
.prose h2:first-child{margin-top:0}
.sidebar{
  display:grid; gap:1rem; align-content:start;
}
.side-card{
  background:linear-gradient(180deg,#fff 0%,#fbf9ff 100%);
  border:1px solid var(--line); border-radius:24px; padding:1.15rem; box-shadow:var(--shadow);
}
.side-card ul{margin:.35rem 0 0}
.footer{
  border-top:1px solid var(--line);
  background:#fff;
  margin-top:2rem;
}
.footer-inner{
  width:min(calc(100% - 2rem), var(--max)); margin:0 auto; padding:2rem 0 2.8rem;
  display:grid; gap:1rem;
}
.footer-links{
  display:flex; flex-wrap:wrap; gap:.8rem 1rem;
}
.footer-links a{color:var(--brand-violet); text-decoration:none}
.small{font-size:.95rem; color:var(--text-muted)}
.notice{
  font-size:.92rem; color:#5f5576; background:#f7f3ff; border:1px solid var(--line);
  border-radius:18px; padding:.9rem 1rem;
}
.meta-row{
  display:flex; flex-wrap:wrap; gap:.6rem 1rem; color:#e8ddff; font-size:.95rem;
}
.divider{height:1px;background:#ece7f7;margin:1rem 0}
@media (max-width: 1080px){
  .hero-grid{grid-template-columns:1fr}
  .hero-stats{grid-template-columns:repeat(3, minmax(0,1fr))}
  .card,.card.featured{grid-column:span 6}
  .card.compact{grid-column:span 4}
  .prose-shell{grid-template-columns:1fr}
}
@media (max-width: 780px){
  body{font-size:1.02rem}
  .menu-btn{display:grid; place-items:center}
  .nav-links{
    position:absolute; left:1rem; right:1rem; top:76px;
    background:rgba(255,255,255,.98);
    border:1px solid var(--line);
    border-radius:22px;
    box-shadow:0 24px 60px rgba(18,10,35,.12);
    padding:1rem;
    display:none;
    flex-direction:column; align-items:stretch;
  }
  .nav-links.open{display:flex}
  .nav-link{padding:.8rem .9rem}
  .hero{padding-top:1.2rem}
  .hero-card{border-radius:24px}
  .hero-stats{grid-template-columns:1fr}
  .trust-strip{grid-template-columns:1fr}
  .card,.card.featured,.card.compact{grid-column:1/-1}
  .section-head{align-items:start; flex-direction:column}
  .prose,.side-card{border-radius:22px}
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function(){
  const btn = document.querySelector('.menu-btn');
  const nav = document.querySelector('.nav-links');
  if(btn && nav){
    btn.addEventListener('click', function(){
      const open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  }
});
</script>

      <span>SignalBytes</span>
    </a>
    <button class="menu-btn" aria-label="Toggle navigation" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <nav class="nav-links" aria-label="Primary navigation">

</div>
